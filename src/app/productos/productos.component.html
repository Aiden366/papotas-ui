<div class="contenedor">
  <h2>Gestión de Papitas 🍟</h2>

  <!-- Formulario de ingreso -->
  <form class="formulario">
    <mat-form-field appearance="outline">
      <mat-label style="color: black; border: 1px solid black;">Nombre</mat-label>
      <input matInput placeholder="Ej. Papitas Picantes" [(ngModel)]="nuevoProducto.nombre" name="nombre" style="color: black;">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label style="color: black; border: 1px solid black;">Precio</mat-label>
      <input matInput type="number" [(ngModel)]="nuevoProducto.precio" name="precio" style="color: black;">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label style="color: black; border: 1px solid black;">Sabor</mat-label>
      <input matInput placeholder="Ej. Chile" [(ngModel)]="nuevoProducto.sabor" name="sabor" style="color: black;">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label style="color: black; border: 1px solid black;">Stock</mat-label>
      <input matInput type="number" [(ngModel)]="nuevoProducto.stock" name="stock" style="color: black;">
    </mat-form-field>

    <button mat-raised-button color="primary">
      <mat-icon>add</mat-icon>
      Agregar Producto
    </button>
  </form>

  <!-- Tabla de productos -->
  <table mat-table [dataSource]="data" class="mat-elevation-z8 tabla">

    <!-- Columnas -->
    <ng-container matColumnDef="nombre">
      <th mat-header-cell *matHeaderCellDef> Nombre </th>
      <td mat-cell *matCellDef="let producto"> {{producto.nombre}} </td>
    </ng-container>

    <ng-container matColumnDef="precio">
      <th mat-header-cell *matHeaderCellDef> Precio ($) </th>
      <td mat-cell *matCellDef="let producto"> {{producto.precio}} </td>
    </ng-container>

    <ng-container matColumnDef="sabor">
      <th mat-header-cell *matHeaderCellDef> Sabor </th>
      <td mat-cell *matCellDef="let producto"> {{producto.sabor}} </td>
    </ng-container>

    <ng-container matColumnDef="stock">
      <th mat-header-cell *matHeaderCellDef> Stock </th>
      <td mat-cell *matCellDef="let producto"> {{producto.stock}} </td>
    </ng-container>

    <!-- Acciones -->
    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef> Acciones </th>
      <td mat-cell *matCellDef="let producto">
        <button mat-icon-button color="accent">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <!-- Filas -->
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
