<div class="contenedor">
  <h2>Gestión de Empleados 🧑‍💼</h2>

  <form class="formulario">
    <mat-form-field appearance="outline">
      <mat-label style="color: black; border: 1px solid black;">Nombre</mat-label>
      <input matInput [(ngModel)]="nuevoEmpleado.nombre" name="nombre" style="color: black;">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label style="color: black; border: 1px solid black;">Puesto</mat-label>
      <input matInput [(ngModel)]="nuevoEmpleado.puesto" name="puesto" style="color: black;">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label style="color: black; border: 1px solid black;">Departamento</mat-label>
      <input matInput [(ngModel)]="nuevoEmpleado.departamento" name="departamento" style="color: black;">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label style="color: black; border: 1px solid black;">Salario</mat-label>
      <input matInput type="number" [(ngModel)]="nuevoEmpleado.salario" name="salario" style="color: black;">
    </mat-form-field>

    <button mat-raised-button color="primary">
      <mat-icon>add</mat-icon>
      Agregar Empleado
    </button>
  </form>

  <table mat-table [dataSource]="data" class="mat-elevation-z8 tabla">

    <ng-container matColumnDef="nombre">
      <th mat-header-cell *matHeaderCellDef> Nombre </th>
      <td mat-cell *matCellDef="let e"> {{e.nombre}} </td>
    </ng-container>

    <ng-container matColumnDef="puesto">
      <th mat-header-cell *matHeaderCellDef> Puesto </th>
      <td mat-cell *matCellDef="let e"> {{e.puesto}} </td>
    </ng-container>

    <ng-container matColumnDef="departamento">
      <th mat-header-cell *matHeaderCellDef> Departamento </th>
      <td mat-cell *matCellDef="let e"> {{e.departamento}} </td>
    </ng-container>

    <ng-container matColumnDef="salario">
      <th mat-header-cell *matHeaderCellDef> Salario </th>
      <td mat-cell *matCellDef="let e"> {{e.salario}} </td>
    </ng-container>

    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef> Acciones </th>
      <td mat-cell *matCellDef="let e">
        <button mat-icon-button color="accent">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
